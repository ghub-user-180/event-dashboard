name: Scrape Events

on:
  schedule:
    - cron: '0 5 * * *'   # täglich 05:00 UTC = 06:00/07:00 Schweizer Zeit
  workflow_dispatch:        # manuell auslösbar via GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scrapers
        run: npx tsx scripts/run-scrapers.ts

      - name: Commit scraped events
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scraped-events.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update scraped events [skip ci]"
            git push
          fi
